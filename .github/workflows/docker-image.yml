name: k8s ci

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ipxz3/nodetsapp:${GITHUB_SHA::7} .

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        run: docker push ipxz3/nodetsapp:${GITHUB_SHA::7}

      - name: Update deployment yaml
        run: |
          sed -i "s|image: ipxz3/nodetsapp:.*|image: ipxz3/nodetsapp:${GITHUB_SHA::7}|g" k8s/nodetsapp.deployment.yml

      - name: Commit update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/nodetsapp.deployment.yml
          git commit -m "update image tag ${GITHUB_SHA::7}"
          git push
